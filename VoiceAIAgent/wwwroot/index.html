<!DOCTYPE html>
<html>

<head>
    <title>Voice AI Assistant</title>

    <style>

        body {
            background: #111;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        .container {
            width: 900px;
            margin: 30px auto;
        }

        h1 {
            text-align: center;
        }
        h2 {
            text-align: center;
        }

        button {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
        }

        #messages {
            margin-top: 30px;
            background: #1b1b1b;
            border-radius: 10px;
            padding: 20px;
            height: 500px;
            overflow: auto;
        }

        .user {
            text-align: right;
            margin: 15px;
        }

            .user div {
                display: inline-block;
                background: #2d72ff;
                padding: 15px;
                border-radius: 15px;
                max-width: 70%;
            }

        .ai {
            text-align: left;
            margin: 15px;
        }

            .ai div {
                display: inline-block;
                background: #333;
                padding: 15px;
                border-radius: 15px;
                max-width: 70%;
            }

        #status {
            margin-top: 15px;
            color: #77ff77;
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>🎤 Voice AI Assistant</h1>
        <h2>
            🎙 Try asking:

            • Tell me about Samsung Galaxy S25
            • What's the battery life?
            • Tell me about the camera
        </h2>

        <center>
            <button onclick="startRecognition()">
                Start Talking
            </button>
            <button onclick="stopRecognition()">
                Stop
            </button>

            <div id="status"
                 style="
                        margin-top:20px;
                        padding:12px;
                        width:260px;
                        background:#222;
                        border-radius:10px;
                        text-align:center;
                        color:#66ff99;
                        font-weight:bold;
                     ">
                ✅ Ready
            </div>
        </center>

        <div id="messages"></div>

    </div>

    <script>


        const recognition =
            new (window.SpeechRecognition || window.webkitSpeechRecognition)();

        recognition.lang = "en-US";
        recognition.continuous = false;
        recognition.interimResults = true;

        speechSynthesis.getVoices();

        speechSynthesis.onvoiceschanged = () => {
            speechSynthesis.getVoices();
        };

        let finalTranscript = "";
        let currentReader = null;
        let currentSpeech = null;

        recognition.onstart = () => {
            status.innerHTML = "🎙 Listening...";
            finalTranscript = "";
        };

        recognition.onresult = (event) => {

            let transcript = "";

            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }

            status.innerHTML = transcript;

            if (event.results[event.results.length - 1].isFinal) {

                finalTranscript = transcript.trim();
                status.innerHTML = "📝 Speech Recognized...";

                addUser(finalTranscript);

                send(finalTranscript);
            }
        };

        recognition.onend = () => {
            status.innerHTML = "";
        };

        let listening = false;

        function startRecognition() {

            speechSynthesis.cancel();

            if (currentReader) {
                currentReader.cancel();
                currentReader = null;
            }

            document.querySelector("button").innerHTML = "🎙 Listening...";
            document.querySelector("button").disabled = true;

            if (listening)
                return;


            listening = true;
            recognition.start();
        }
        recognition.onstart = () => {
            status.innerHTML = "🎙 Listening...";
            finalTranscript = "";
        };

        recognition.onend = () => {

            document.querySelector("button").innerHTML = "Start Talking";
            document.querySelector("button").disabled = false;
            listening = false;

            status.innerHTML = "✅ Ready";
            document.querySelector("button").innerHTML = "Start Talking";
            document.querySelector("button").disabled = false;
            listening = false;
        };

        function addUser(text) {

            messages.innerHTML += `

            <div class="user">
            <div>${text}</div>
            </div>

            `;

            messages.scrollTop = messages.scrollHeight;

        }
        function stopRecognition() {

            speechSynthesis.cancel();

            if (currentReader) {
                currentReader.cancel();
                currentReader = null;
            }

            listening = false;
            recognition.stop();

            document.querySelector("button").innerHTML = "Start Talking";
            document.querySelector("button").disabled = false;

            status.innerHTML = "✅ Ready";
        }

        async function addAI(text) {

            const id = "ai_" + Date.now();

            messages.innerHTML += `
                <div class="ai">
                    <div id="${id}"></div>
                </div>
            `;

            const element = document.getElementById(id);

            for (let i = 0; i < text.length; i++) {

                element.innerHTML += text[i];

                if (text[i] === '.')
                    await new Promise(r => setTimeout(r, 250));

                messages.scrollTop = messages.scrollHeight;

                await new Promise(r => setTimeout(r, 8));
            }

        }

        async function speak(text) {

            speechSynthesis.cancel();

            const sentences = text.match(/[^.!?]+[.!?]?/g) || [text];

            for (const sentence of sentences) {

                await new Promise(resolve => {

                    const utterance = new SpeechSynthesisUtterance(sentence.trim());

                    const voices = speechSynthesis.getVoices();

                    utterance.voice =
                        voices.find(v => v.name === "Google UK Female") ||
                        voices.find(v => v.name === "Google US English") ||
                        voices.find(v => v.lang === "en-US");

                    utterance.lang = "en-GB";
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    utterance.volume = 1;

                    utterance.onend = resolve;

                    speechSynthesis.speak(utterance);

                });

            }

            status.innerHTML = "✅ Ready";
        }

        
        async function send(message) {

            status.innerHTML = "🧠 Thinking...";

            speechSynthesis.cancel();

            const id = "ai_" + Date.now();

             messages.innerHTML += `
                <div class="ai">
                    <div id="${id}"></div>
                </div>
            `;

            const element = document.getElementById(id);

            const response = await fetch(
                "/api/chat/stream?message=" + encodeURIComponent(message)
                 );

            currentReader = response.body.getReader();

            const reader = currentReader;

            const decoder = new TextDecoder();

            let fullText = "";

            while (true) {

                const { done, value } = await reader.read();

                if (done)
                    break;

                const chunk = decoder.decode(value);

                const lines = chunk.split("\n");

                for (const line of lines) {

                    if (!line.startsWith("data:"))
                        continue;

                    const text = line.replace("data:", "").trim();

                    if (text === "[DONE]")
                        continue;

                    fullText += text;

                    element.innerHTML = fullText;
                    status.innerHTML = "💬 Responding...";

                    messages.scrollTop = messages.scrollHeight;
                }
            }

            status.innerHTML = "🔊 Speaking...";
            status.innerHTML = "✅ Ready";

            speak(fullText);
            currentReader = null;
        }

    </script>

</body>

</html>
